name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend: unit tests (no database required) ───────────────────────────────
  backend-unit:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/unit/ -v --tb=short

  # ── Backend: integration tests (PostgreSQL service) ──────────────────────────
  backend-integration:
    name: Backend — Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: attendance
          POSTGRES_PASSWORD: attendance_secret
          POSTGRES_DB: attendance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Run integration tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://attendance:attendance_secret@localhost:5432/attendance_test
        run: pytest tests/integration/ -v --tb=short

  # ── Frontend: TypeScript check + production build ────────────────────────────
  frontend-build:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
